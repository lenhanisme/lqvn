<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đăng Nhập - LQVN.VN</title>
    
    <link rel="icon" type="image/png" href="https://cdn.vn.garenanow.com/web/kg/home/images/logo-new.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        lqvn: { dark: '#0B0E14', card: '#151A23', red: '#E11D48' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-lqvn-dark flex items-center justify-center min-h-screen font-sans antialiased px-4 relative">

    <a href="/home" class="absolute top-4 left-4 sm:top-6 sm:left-6 text-gray-400 hover:text-white transition bg-lqvn-card p-3 rounded-full border border-gray-800">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <div class="bg-lqvn-card p-8 rounded-2xl shadow-[0_0_30px_rgba(225,29,72,0.15)] border border-gray-800 w-full max-w-md">
        <div class="text-center mb-8">
            <a href="/" class="inline-flex items-center gap-2 transition hover:scale-105">
                <img src="https://cdn.vn.garenanow.com/web/kg/home/images/logo-new.png" alt="LQVN" class="h-12 drop-shadow-[0_0_8px_rgba(225,29,72,0.6)]">
            </a>
            <h1 class="text-2xl font-black text-white mt-4 uppercase tracking-wide">Đăng Nhập</h1>
            <p class="text-gray-400 text-sm mt-1">Chào mừng Kiện Tướng trở lại</p>
        </div>

        <form id="formDangNhap">
            <div class="mb-5">
                <label class="block text-gray-400 text-sm font-semibold mb-2" for="emailLogin">Địa chỉ Email</label>
                <div class="relative">
                    <i class="fa-solid fa-envelope absolute left-3.5 top-3.5 text-gray-500"></i>
                    <input type="email" id="emailLogin" class="w-full bg-lqvn-dark text-white border border-gray-700 rounded-xl pl-10 pr-4 py-3 focus:outline-none focus:border-lqvn-red transition" placeholder="Nhập email của bạn" required>
                </div>
            </div>

            <div class="mb-6">
                <div class="flex justify-between mb-2">
                    <label class="block text-gray-400 text-sm font-semibold" for="passLogin">Mật khẩu</label>
                    <a href="/khoiphuctaikhoan" class="text-sm text-lqvn-red hover:text-red-400 font-semibold transition">Quên mật khẩu?</a>
                </div>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-3.5 top-3.5 text-gray-500"></i>
                    <input type="password" id="passLogin" class="w-full bg-lqvn-dark text-white border border-gray-700 rounded-xl pl-10 pr-4 py-3 focus:outline-none focus:border-lqvn-red transition" placeholder="••••••••" required>
                </div>
                <p id="errorMsgLogin" class="text-lqvn-red text-xs mt-2 hidden font-medium"></p>
            </div>

            <button type="submit" id="btnLogin" class="w-full bg-gradient-to-r from-lqvn-red to-red-600 hover:to-red-700 text-white font-bold py-3.5 rounded-xl transition shadow-[0_0_15px_rgba(225,29,72,0.3)] flex items-center justify-center gap-2">
                <span>ĐĂNG NHẬP VÀO SHOP</span>
            </button>
        </form>

        <div class="mt-6 flex items-center justify-between">
            <hr class="w-full border-gray-800">
            <span class="p-3 text-gray-600 text-xs font-bold uppercase">Hoặc</span>
            <hr class="w-full border-gray-800">
        </div>

        <div class="mt-4 grid grid-cols-2 gap-4">
            <button class="bg-lqvn-dark hover:bg-gray-800 text-white py-3 rounded-xl transition flex items-center justify-center gap-2 border border-gray-800 font-semibold text-sm">
                <i class="fa-brands fa-google text-red-400"></i> Google
            </button>
            <button class="bg-lqvn-dark hover:bg-gray-800 text-white py-3 rounded-xl transition flex items-center justify-center gap-2 border border-gray-800 font-semibold text-sm">
                <i class="fa-brands fa-facebook text-blue-500"></i> Facebook
            </button>
        </div>

        <p class="text-center text-gray-400 mt-8 text-sm">
            Chưa có tài khoản? <a href="/dangky" class="text-lqvn-red font-bold hover:underline">Đăng ký ngay</a>
        </p>
    </div>

    <!-- CUSTOM POPUP -->
    <div id="customPopup" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-lqvn-card border border-gray-800 rounded-2xl shadow-[0_0_30px_rgba(225,29,72,0.3)] max-w-sm w-full p-6 text-center transform transition-all duration-300 scale-95 opacity-0" id="popupContent">
            <div id="popupIcon" class="text-6xl mb-4"></div>
            <h3 id="popupTitle" class="text-xl font-black text-white mb-2 uppercase"></h3>
            <p id="popupMessage" class="text-gray-400 text-sm mb-6"></p>
            <button id="popupBtn" class="w-full bg-lqvn-red hover:bg-red-700 text-white font-bold py-3 rounded-xl transition">
                ĐỒNG Ý
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBUozdLXZIBh_JZflrwJohU_YbvpFX-UOQ",
            authDomain: "lqvn-772cf.firebaseapp.com",
            databaseURL: "https://lqvn-772cf-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "lqvn-772cf",
            storageBucket: "lqvn-772cf.firebasestorage.app",
            messagingSenderId: "110517027124",
            appId: "1:110517027124:web:c0ac3216be505323f86561",
            measurementId: "G-PBW4QVR4GL"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // HÀM HIỂN THỊ POPUP
        function showPopup(type, title, message, callback = null) {
            const popup = document.getElementById('customPopup');
            const content = document.getElementById('popupContent');
            const icon = document.getElementById('popupIcon');
            
            if (type === 'success') {
                icon.innerHTML = '<i class="fa-solid fa-circle-check text-green-500 drop-shadow-[0_0_10px_rgba(34,197,94,0.5)]"></i>';
            } else {
                icon.innerHTML = '<i class="fa-solid fa-circle-xmark text-lqvn-red drop-shadow-[0_0_10px_rgba(225,29,72,0.5)]"></i>';
            }

            document.getElementById('popupTitle').innerText = title;
            document.getElementById('popupMessage').innerText = message;
            popup.classList.remove('hidden');

            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);

            document.getElementById('popupBtn').onclick = () => {
                content.classList.remove('scale-100', 'opacity-100');
                content.classList.add('scale-95', 'opacity-0');
                setTimeout(() => {
                    popup.classList.add('hidden');
                    if (callback) callback();
                }, 300);
            };
        }

        document.getElementById('formDangNhap').addEventListener('submit', (e) => {
            e.preventDefault();
            const btnLogin = document.getElementById('btnLogin');
            const email = document.getElementById('emailLogin').value;
            const pass = document.getElementById('passLogin').value;

            btnLogin.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> ĐANG XỬ LÝ...';
            btnLogin.disabled = true;

            signInWithEmailAndPassword(auth, email, pass)
                .then((userCredential) => {
                    // Dùng popup thông báo thành công trước khi chuyển trang
                    showPopup('success', 'Thành Công!', 'Đăng nhập thành công, đang vào hệ thống...', () => {
                        window.location.href = "/home";
                    });
                })
                .catch((error) => {
                    btnLogin.innerHTML = 'ĐĂNG NHẬP VÀO SHOP';
                    btnLogin.disabled = false;
                    
                    if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                        showPopup('error', 'Đăng nhập thất bại', 'Tài khoản hoặc mật khẩu không chính xác!');
                    } else if (error.code === 'auth/too-many-requests') {
                        showPopup('error', 'Giới hạn truy cập', 'Quá nhiều lần đăng nhập sai. Vui lòng thử lại sau.');
                    } else {
                        showPopup('error', 'Lỗi Hệ Thống', error.message);
                    }
                });
        });
    </script>
</body>
</html>
