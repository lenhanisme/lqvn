<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - ShopGame</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#121212] flex items-center justify-center min-h-screen font-sans antialiased px-4">

    <div class="bg-[#1a1a1a] p-8 rounded-xl shadow-2xl border border-gray-800 w-full max-w-md">
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center gap-2 transition hover:scale-105">
                <i class="fa-solid fa-gamepad text-4xl text-red-500"></i>
            </a>
            <h1 class="text-2xl font-bold text-white mt-4">Chào mừng trở lại!</h1>
            <p class="text-gray-400 text-sm mt-1">Đăng nhập để tiếp tục mua sắm</p>
        </div>

        <form id="formDangNhap">
            <div class="mb-5">
                <label class="block text-gray-400 text-sm font-semibold mb-2" for="emailLogin">Địa chỉ Email</label>
                <div class="relative">
                    <i class="fa-solid fa-envelope absolute left-3 top-3.5 text-gray-500"></i>
                    <input type="email" id="emailLogin" class="w-full bg-[#242424] text-white border border-gray-700 rounded-lg pl-10 pr-4 py-3 focus:outline-none focus:border-red-500 transition" placeholder="nhan@example.com" required>
                </div>
            </div>

            <div class="mb-6">
                <div class="flex justify-between mb-2">
                    <label class="block text-gray-400 text-sm font-semibold" for="passLogin">Mật khẩu</label>
                    <a href="khoiphuctaikhoan.html" class="text-sm text-red-500 hover:text-red-400 font-semibold transition">Quên mật khẩu?</a>
                </div>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-3 top-3.5 text-gray-500"></i>
                    <input type="password" id="passLogin" class="w-full bg-[#242424] text-white border border-gray-700 rounded-lg pl-10 pr-4 py-3 focus:outline-none focus:border-red-500 transition" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-red-600 to-red-500 hover:from-red-500 hover:to-red-400 text-white font-bold py-3 rounded-lg transition transform hover:scale-[1.02] shadow-lg shadow-red-500/30">
                ĐĂNG NHẬP
            </button>
        </form>

        <div class="mt-6 flex items-center justify-between">
            <hr class="w-full border-gray-700">
            <span class="p-2 text-gray-500 text-sm font-semibold">HOẶC</span>
            <hr class="w-full border-gray-700">
        </div>

        <div class="mt-4 grid grid-cols-2 gap-4">
            <button id="btnGoogleLogin" class="bg-[#242424] hover:bg-gray-700 text-white py-2.5 rounded-lg transition flex items-center justify-center gap-2 border border-gray-700 font-semibold">
                <i class="fa-brands fa-google text-red-400"></i> Google
            </button>
            <button id="btnFacebookLogin" class="bg-[#242424] hover:bg-gray-700 text-white py-2.5 rounded-lg transition flex items-center justify-center gap-2 border border-gray-700 font-semibold">
                <i class="fa-brands fa-facebook text-blue-500"></i> Facebook
            </button>
        </div>

        <p class="text-center text-gray-400 mt-8 text-sm">
            Chưa có tài khoản? <a href="dangky.html" class="text-red-500 font-bold hover:underline">Đăng ký ngay</a>
        </p>
    </div>

    <script type="module">
        document.getElementById('formDangNhap').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('emailLogin').value;
            const pass = document.getElementById('passLogin').value;
            console.log("Xử lý đăng nhập Firebase cho:", email);
            // Code Firebase signInWithEmailAndPassword ở đây
        });
    </script>
</body>
</html>
